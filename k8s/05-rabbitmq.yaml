apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-data
  namespace: cicd
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: cicd-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: cicd
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: cicd-platform
    app.kubernetes.io/component: message-broker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/part-of: cicd-platform
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                configMapKeyRef:
                  name: cicd-config
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: cicd-secrets
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_MNESIA_BASE
              value: /var/lib/rabbitmq/mnesia
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-data

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: cicd
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: cicd-platform
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  namespace: cicd
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: cicd-platform
spec:
  type: NodePort
  selector:
    app: rabbitmq
  ports:
    - name: management
      port: 15672
      targetPort: management
      nodePort: 31672
      protocol: TCP
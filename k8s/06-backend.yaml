# ─────────────────────────────────────────────────────────────────────────────
# Backend — Deployment
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cicd
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: cicd-platform
    app.kubernetes.io/component: api
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: cicd-platform
    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for Postgres at postgres-service:5432..."
              until nc -z postgres-service 5432; do
                echo "  postgres not ready, sleeping 2s"
                sleep 2
              done
              echo "Postgres is up."
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

        - name: wait-for-rabbitmq
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for RabbitMQ at rabbitmq-service:5672..."
              until nc -z rabbitmq-service 5672; do
                echo "  rabbitmq not ready, sleeping 2s"
                sleep 2
              done
              echo "RabbitMQ is up."
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

      containers:
        - name: backend
          image: backend:latest
          imagePullPolicy: Never

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: cicd-config

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cicd-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cicd-secrets
                  key: JWT_SECRET
            - name: RABBITMQ_URL
              value: "amqp://cicd_user:cicd_pass@rabbitmq-service:5672/"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 12
            periodSeconds: 5

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: npm-cache
              mountPath: /root/.npm

      volumes:
        - name: tmp
          emptyDir: {}
        - name: npm-cache
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: cicd
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: cicd-platform
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: backend-nodeport
  namespace: cicd
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: cicd-platform
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30000
      protocol: TCP